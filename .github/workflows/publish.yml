name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in sdk cli; do
            PKG_VERSION=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::Tag version ($TAG_VERSION) does not match packages/$pkg/package.json version ($PKG_VERSION)"
              exit 1
            fi
          done
          echo "Publishing version $TAG_VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Publish SDK to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/sdk
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "Publishing $VERSION to dist-tag: $DIST_TAG"
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --access public --tag "$DIST_TAG"
          else
            npm publish --provenance --access public --tag "$DIST_TAG"
          fi

      - name: Publish CLI to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/cli
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "Publishing $VERSION to dist-tag: $DIST_TAG"
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --access public --tag "$DIST_TAG"
          else
            npm publish --provenance --access public --tag "$DIST_TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
