name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement. Please describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this working? CLI flags, SDK methods, architecture changes, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of Atlas does this affect?
      multiple: true
      options:
        - CLI
        - SDK (@wisecom/atlas-sdk)
        - Backup
        - Restore
        - Verification
        - Catalog / List
        - Deletion
        - Storage / S3
        - Encryption
        - Other
    validations:
      required: true
